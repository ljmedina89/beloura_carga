<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Afiliados BELOURA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      color: #111;
    }

    .container {
      max-width: 520px;
      margin: 45px auto;
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    .secondary {
      background: #444;
      margin-top: 10px;
    }

    .success {
      margin-top: 20px;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #10b981;
      padding: 15px;
      border-radius: 12px;
      display: none;
      text-align: center;
      line-height: 1.5;
    }

    .error {
      margin-top: 20px;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #ef4444;
      padding: 15px;
      border-radius: 12px;
      display: none;
      text-align: center;
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 28px 0;
    }

    .small {
      font-size: 13px;
      color: #666;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Únete a BELOURA</h1>
  <p class="subtitle">Regístrate como afiliado y recibe tu código + PIN de acceso.</p>

  <label>Nombre completo</label>
  <input id="nombre" placeholder="Ej: María Pérez">

  <label>Cédula / Documento</label>
  <input id="cedula" placeholder="Ej: 1200000000">

  <label>WhatsApp</label>
  <input id="telefono" placeholder="Ej: 0999999999">

  <label>Ciudad</label>
  <input id="ciudad" placeholder="Ej: Babahoyo">

  <label>Provincia</label>
  <input id="provincia" placeholder="Ej: Los Ríos">

  <label>Correo</label>
  <input id="email" type="email" placeholder="Ej: correo@email.com">

  <label>Precio por libra que deseas vender</label>
  <input id="precioVenta" type="number" step="0.01" placeholder="Ej: 7">

  <button onclick="registrar()">Registrarme</button>

  <div id="success" class="success"></div>
  <div id="error" class="error"></div>

  <div class="divider"></div>

  <h3 style="text-align:center;">¿Olvidaste tu PIN?</h3>
  <p class="small">Ingresa tu cédula y correo registrados para generar un nuevo PIN.</p>

  <button class="secondary" onclick="recuperarPin()">Recuperar PIN</button>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwFSCjTVphT2I4pq4DUAvr54euIBZvceLz5IcorMaNqZanxalKKQRCCtNf_pAdu9jfaDA/exec";

  function mostrarExito(msg) {
    const success = document.getElementById("success");
    const error = document.getElementById("error");

    success.innerHTML = msg;
    success.style.display = "block";
    error.style.display = "none";
  }

  function mostrarError(msg) {
    const success = document.getElementById("success");
    const error = document.getElementById("error");

    error.innerHTML = msg;
    error.style.display = "block";
    success.style.display = "none";
  }

  async function registrar() {
    const nombre = document.getElementById("nombre").value.trim();
    const cedula = document.getElementById("cedula").value.trim();
    const telefono = document.getElementById("telefono").value.trim();
    const ciudad = document.getElementById("ciudad").value.trim();
    const provincia = document.getElementById("provincia").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const precioVenta = document.getElementById("precioVenta").value.trim();

    if (!nombre || !cedula || !telefono || !ciudad || !provincia || !email) {
      mostrarError("Completa todos los campos obligatorios.");
      return;
    }

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "registrarAfiliado",
          nombre,
          cedula,
          telefono,
          ciudad,
          provincia,
          email,
          precioBase: 5,
          precioVenta: precioVenta || 7,
          observacion: "Registro desde formulario web"
        })
      });

      const json = await res.json();

      if (json.ok) {
        mostrarExito(`
          ✅ Registro exitoso<br><br>
          Tu código de afiliado:<br>
          <strong>${json.codigoAfiliado}</strong><br><br>
          Tu PIN de acceso:<br>
          <strong>${json.pin}</strong><br><br>
          Guarda esta información para entrar a tu dashboard.
        `);
      } else {
        mostrarError(json.error || "No se pudo registrar el afiliado.");
      }

    } catch (err) {
      console.error(err);
      mostrarError("Error de conexión con el sistema.");
    }
  }

  async function recuperarPin() {
    const cedula = document.getElementById("cedula").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();

    if (!cedula || !email) {
      mostrarError("Para recuperar tu PIN debes ingresar cédula y correo.");
      return;
    }

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "recuperarPinAfiliado",
          cedula,
          email
        })
      });

      const json = await res.json();

      if (json.ok) {
        mostrarExito(`
          ✅ PIN recuperado correctamente<br><br>
          Código de afiliado:<br>
          <strong>${json.codigoAfiliado}</strong><br><br>
          Nuevo PIN:<br>
          <strong>${json.pin}</strong><br><br>
          Usa este PIN para ingresar a tu dashboard.
        `);
      } else {
        mostrarError(json.error || "No se pudo recuperar el PIN.");
      }

    } catch (err) {
      console.error(err);
      mostrarError("Error de conexión con el sistema.");
    }
  }
</script>

</body>
</html>
